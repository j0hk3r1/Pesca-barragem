<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>🎣 Pesca Barragem</title>
  <meta name="description" content="Setup de pesca para barragens portuguesas — material Decathlon, montagens, nós, peixes e tamanhos.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/docsify-themeable@0.9.0/dist/css/theme-simple.css"
        integrity="sha384-IuZucGNxm+6VGvZLv3+oxh1kE70WlIXci7p3g/Dtchij0oKFb9s8zG9GYnIkl8CB"
        crossorigin="anonymous">
  <style>
    /* ---------- Tema claro (limpo, legível) ---------- */
    :root{
      --theme-color:#0a7d5a;                 /* verde-água (acento) */
      --base-font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      --base-font-size:16px;
      --base-line-height:1.65;
      --content-max-width:80em;
      --sidebar-width:34rem;
      --link-color:#0a7d5a;
      --heading-h2-border-color:#e6e9ec;
    }
    /* títulos */
    .markdown-section h2{border-bottom:1px solid #e6e9ec;padding-bottom:.35em;margin-top:2.1em;}
    /* diagramas/imagens como cartões */
    .markdown-section img{
      border:1px solid #e2e6ea;border-radius:12px;
      box-shadow:0 4px 16px rgba(20,30,40,.10);background:#fff;
    }
    /* tabelas limpas */
    .markdown-section table{display:table;width:100%;border-collapse:collapse;}
    .markdown-section td,.markdown-section th{padding:.55em .85em;}
    .markdown-section tbody tr{transition:background .15s;}
    .markdown-section tbody tr:hover{background:#f3f7f5;}
    .markdown-section th{font-weight:700;}
    /* code/montagens */
    .markdown-section pre{border:1px solid #e6e9ec;border-radius:10px;}
    /* sidebar item ativo */
    .sidebar .app-name-link{font-weight:800;font-size:1.12rem;}
    .sidebar ul li.active>a{background:rgba(10,125,90,.08);border-radius:6px;}
    /* cover */
    section.cover .cover-main>p:last-child a{font-weight:700;border-radius:8px;}
  </style>
</head>
<body>
  <div id="app">A carregar…</div>
  <script>
    window.$docsify = {
      name: '🎣 Pesca Barragem',
      repo: 'https://github.com/j0hk3r1/Pesca-barragem',
      loadSidebar: true,
      subMaxLevel: 3,
      relativePath: true,
      auto2top: true,
      coverpage: true,
      onlyCover: false,
      maxLevel: 4,
      search: {
        placeholder: 'Pesquisar…',
        noData: 'Sem resultados.',
        depth: 4,
        paths: ['/README.md','/MATERIAL.md','/EXEMPLOS-MODULAR.md','/PEIXES-BARRAGENS.md','/TAMANHOS.md','/NOS.md','/CANA.md','/KIT-PESADO.md']
      },
      copyCode: { buttonText: 'copiar', successText: 'copiado ✓' },
      pagination: { previousText: '←', nextText: '→', crossChapter: true }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/docsify.min.js"
          integrity="sha384-KaHhgnx/OTLoJ4J33SSJsF4x1pk4I7q3s5ZOfIDHJYl6IG7Oyn2vNDsHiWJe46fD"
          crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/plugins/search.min.js"
          integrity="sha384-LthJPBJ4RGco78kBY+EmKz5rmISZ5vrtAu3+l2ALQ2mrZHOe6Wyf6knyKjeC4cL6"
          crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4.13.1/lib/plugins/zoom-image.min.js"
          integrity="sha384-fYBaBAsdPMjWt1AuA+txMoztHnl+zLgObSvwddIabbfUp+36gf/vNOKx88f37zix"
          crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@3.0.0/dist/docsify-copy-code.min.js"
          integrity="sha384-Vu4LjJ210wltbg1I3zl1f5n8qLSDr9GE7ij2JfiMbV64UCFP2RgFtG8W2Gh6Khwe"
          crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2.10.1/dist/docsify-pagination.min.js"
          integrity="sha384-uFEp18/1vv2dYlO64J2lOcnbhirAQZPtruqAZZ7PZYoXenm5c+tIs3AqSMjVMRe8"
          crossorigin="anonymous"></script>
</body>
</html>
