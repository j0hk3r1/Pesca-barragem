<svg xmlns="http://www.w3.org/2000/svg" width="760" height="540" viewBox="0 0 760 540" font-family="Segoe UI, Arial, sans-serif">
  <rect width="760" height="540" fill="#0d1117"/>
  <text x="20" y="30" fill="#ff8c42" font-size="19" font-weight="bold">🟠 Boia deslizante — onde fica o batente e como desliza</text>

  <!-- divider -->
  <line x1="380" y1="60" x2="380" y2="520" stroke="#222a35" stroke-width="1.5" stroke-dasharray="4 4"/>

  <!-- ============ PANEL A: lançamento (compacta) ============ -->
  <text x="190" y="78" fill="#e5d98a" font-size="15" font-weight="bold" text-anchor="middle">1 · NO LANÇAMENTO</text>
  <text x="190" y="96" fill="#8b949e" font-size="12" text-anchor="middle">boia desce até ao stop → montagem curta</text>

  <line x1="190" y1="110" x2="190" y2="200" stroke="#b8a55a" stroke-width="3"/>
  <text x="205" y="135" fill="#ff7b72" font-size="11">nó-batente (lá em cima, fora de vista)</text>

  <!-- float slid DOWN near the stop -->
  <path d="M190 205 q16 20 0 60 q-16 -40 0 -60 z" fill="#ff8c42" stroke="#ffae6b"/>
  <text x="215" y="240" fill="#ffae6b" font-size="12" font-weight="bold">boia (slid down)</text>

  <!-- bottom stop bead -->
  <circle cx="190" cy="278" r="5" fill="#c9d1d9"/>
  <text x="205" y="282" fill="#8b949e" font-size="11">stop/missanga de baixo</text>

  <ellipse cx="190" cy="298" rx="10" ry="6" fill="none" stroke="#9aa0a6" stroke-width="2"/>
  <text x="205" y="302" fill="#8b949e" font-size="11">destorcedor</text>

  <line x1="190" y1="305" x2="190" y2="345" stroke="#7fd3ff" stroke-width="2"/>
  <circle cx="190" cy="345" r="5" fill="#9aa0a6"/>
  <path d="M190 350 q0 12 -9 12 q-8 0 -8 -8" fill="none" stroke="#c9d1d9" stroke-width="2"/>
  <text x="205" y="352" fill="#8b949e" font-size="11">chumbo + anzol</text>

  <rect x="60" y="395" width="260" height="46" rx="8" fill="#1a2a1a" stroke="#5fd35f"/>
  <text x="190" y="415" fill="#9fe89f" font-size="12" text-anchor="middle" font-weight="bold">Tudo junto = compacto</text>
  <text x="190" y="431" fill="#8b949e" font-size="11" text-anchor="middle">lança longe mesmo p/ pescar a 5–8 m</text>

  <!-- ============ PANEL B: a pescar (funda) ============ -->
  <text x="570" y="78" fill="#e5d98a" font-size="15" font-weight="bold" text-anchor="middle">2 · A PESCAR (fundo)</text>
  <text x="570" y="96" fill="#8b949e" font-size="12" text-anchor="middle">chumbo puxa → boia sobe até ao batente</text>

  <!-- water -->
  <rect x="400" y="120" width="360" height="400" fill="#0b2a3a" opacity="0.45"/>
  <line x1="400" y1="120" x2="760" y2="120" stroke="#7fd3ff" stroke-width="1.5" stroke-dasharray="6 5" opacity="0.7"/>
  <text x="735" y="114" fill="#7fd3ff" font-size="11">água</text>

  <line x1="570" y1="104" x2="570" y2="150" stroke="#b8a55a" stroke-width="3"/>
  <!-- stop knot at top of float -->
  <line x1="558" y1="150" x2="582" y2="150" stroke="#ff7b72" stroke-width="3"/>
  <circle cx="570" cy="160" r="4" fill="#c9d1d9"/>
  <text x="590" y="148" fill="#ff7b72" font-size="12" font-weight="bold">nó-batente (stop knot)</text>
  <text x="590" y="163" fill="#8b949e" font-size="11">+ missanga · trava a boia aqui</text>

  <!-- float risen to batente -->
  <path d="M570 166 q16 22 0 66 q-16 -44 0 -66 z" fill="#ff8c42" stroke="#ffae6b"/>
  <text x="590" y="205" fill="#ffae6b" font-size="12" font-weight="bold">boia subiu</text>

  <!-- line through float to shots -->
  <line x1="570" y1="232" x2="570" y2="320" stroke="#b8a55a" stroke-width="2"/>
  <circle cx="570" cy="300" r="4.5" fill="#9aa0a6"/>
  <circle cx="570" cy="312" r="4.5" fill="#9aa0a6"/>
  <text x="590" y="312" fill="#8b949e" font-size="11">chumbos de pinça</text>

  <ellipse cx="570" cy="338" rx="10" ry="6" fill="none" stroke="#9aa0a6" stroke-width="2"/>
  <line x1="570" y1="344" x2="570" y2="430" stroke="#7fd3ff" stroke-width="2"/>
  <path d="M570 432 q0 13 -9 13 q-8 0 -8 -8" fill="none" stroke="#c9d1d9" stroke-width="2.5"/>
  <circle cx="578" cy="444" r="7" fill="#8B4513" stroke="#b5651d"/>
  <text x="590" y="430" fill="#e5d98a" font-size="12" font-weight="bold">anzol + isco (rente ao fundo)</text>

  <rect x="400" y="470" width="360" height="50" fill="#3a2e1f"/>
  <line x1="400" y1="470" x2="760" y2="470" stroke="#6b5836" stroke-width="2"/>
  <text x="735" y="492" fill="#b08a52" font-size="11">fundo</text>

  <!-- depth bracket -->
  <line x1="425" y1="150" x2="425" y2="444" stroke="#f0c000" stroke-width="1.5"/>
  <line x1="421" y1="150" x2="429" y2="150" stroke="#f0c000" stroke-width="1.5"/>
  <line x1="421" y1="444" x2="429" y2="444" stroke="#f0c000" stroke-width="1.5"/>
  <text x="412" y="300" fill="#f0c000" font-size="11.5" transform="rotate(-90 412 300)" text-anchor="middle">profundidade = batente → anzol</text>
</svg>
