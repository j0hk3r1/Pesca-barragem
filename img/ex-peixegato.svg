  <ellipse cx="175" cy="158" rx="11" ry="7" fill="none" stroke="#9aa0a6" stroke-width="2"/>

  <line x1="175" y1="165" x2="175" y2="300" stroke="#7fd3ff" stroke-width="2.5"/>
