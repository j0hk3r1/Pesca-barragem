  <text x="48" y="414" fill="#ff7b72" font-size="12.5" font-weight="bold">⚠️ Espinhos (spines) nas barbatanas (fins) picam — pega por trás da cabeça.</text>
  <text x="48" y="434" fill="#ff9a93" font-size="12">Invasor → por lei não se devolve vivo. Material leve apanha-o bem.</text>
