  <path d="M175 302 q0 16 -11 16 q-11 0 -11 -11" fill="none" stroke="#c9d1d9" stroke-width="2.5"/>
  <circle cx="184" cy="316" r="9" fill="#8B4513" stroke="#b5651d"/>
  <text x="200" y="310" fill="#e5d98a" font-size="13" font-weight="bold">anzol (hook) #6 (SN HOOK WORM)</text>
  <text x="200" y="327" fill="#8b949e" font-size="12">+ chouriço (sausage) / fígado / minhoca (worm)</text>

  <rect x="0" y="360" width="560" height="110" fill="#2e2415"/>
  <line x1="0" y1="360" x2="560" y2="360" stroke="#5a4a2e" stroke-width="2"/>
