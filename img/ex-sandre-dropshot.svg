<svg xmlns="http://www.w3.org/2000/svg" width="560" height="500" viewBox="0 0 560 500" font-family="Segoe UI, Arial, sans-serif">
  <rect width="560" height="500" fill="#0d1117"/>
  <text x="20" y="32" fill="#9a8cff" font-size="19" font-weight="bold">🟣 SANDRE / LÚCIO-PERCA (zander) — dropshot</text>
  <text x="20" y="54" fill="#8b949e" font-size="13">fundo / estrutura funda · amanhecer e anoitecer · barco ou margem</text>

  <rect x="0" y="70" width="560" height="430" fill="#0b1f2e" opacity="0.5"/>
  <line x1="0" y1="70" x2="560" y2="70" stroke="#7fd3ff" stroke-width="1.5" stroke-dasharray="6 5" opacity="0.7"/>
  <text x="505" y="64" fill="#7fd3ff" font-size="12">água</text>

  <line x1="200" y1="78" x2="200" y2="120" stroke="#b8a55a" stroke-width="5"/>
  <text x="225" y="100" fill="#e5d98a" font-size="13" font-weight="bold">Linha-mãe → snap</text>

  <ellipse cx="200" cy="132" rx="13" ry="8" fill="none" stroke="#f0c000" stroke-width="3"/>
  <path d="M211 132 q14 0 14 10 q0 9 -9 9" fill="none" stroke="#f0c000" stroke-width="3"/>
  <text x="235" y="136" fill="#f0c000" font-size="13" font-weight="bold">snap fixo</text>

  <line x1="200" y1="150" x2="200" y2="250" stroke="#7fd3ff" stroke-width="3"/>
  <text x="225" y="205" fill="#7fd3ff" font-size="13" font-weight="bold">leader 60–100 cm</text>

  <!-- dropshot knot: hook on a tag, line continues down -->
  <circle cx="200" cy="270" r="4" fill="#ff7b72"/>
  <text x="120" y="274" fill="#ff7b72" font-size="11" text-anchor="end">nó dropshot →</text>
  <!-- hook standing out, point up -->
  <path d="M200 270 q26 4 26 -20 q0 -10 -8 -10" fill="none" stroke="#c9d1d9" stroke-width="2.5"/>
  <path d="M218 248 q34 6 38 30 q-28 -8 -38 -18 z" fill="#9a8cff" stroke="#b3a8ff"/>
  <text x="272" y="258" fill="#e5d98a" font-size="13" font-weight="bold">anzol #1–1/0 (ponta p/ cima)</text>
  <text x="272" y="275" fill="#8b949e" font-size="11">+ vinil pequeno (soft plastic / shad 7–10 cm)</text>

  <!-- main line continues to weight -->
  <line x1="200" y1="270" x2="200" y2="420" stroke="#b8a55a" stroke-width="2.5"/>
  <text x="225" y="355" fill="#8b949e" font-size="12">altura do isco ao fundo: 15–40 cm</text>

  <!-- drop-shot weight -->
  <path d="M192 420 q8 -10 16 0 q0 22 -8 30 q-8 -8 -8 -30 z" fill="#7d7f85" stroke="#b0b3b8"/>
  <text x="225" y="438" fill="#c9d1d9" font-size="13" font-weight="bold">chumbo de dropshot 5–12 g</text>

  <rect x="0" y="458" width="560" height="42" fill="#2e2415"/>
  <line x1="0" y1="458" x2="560" y2="458" stroke="#5a4a2e" stroke-width="2"/>
  <text x="500" y="480" fill="#b08a52" font-size="12">fundo</text>
  <text x="30" y="480" fill="#9a8cff" font-size="12">▸ Abana no sítio (não recolhes) — o vinil dança parado. Anzol forte p/ a boca óssea.</text>
</svg>
