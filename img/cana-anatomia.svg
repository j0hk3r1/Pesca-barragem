<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" viewBox="0 0 760 300" font-family="Segoe UI, Arial, sans-serif">
  <rect width="760" height="300" fill="#0d1117"/>
  <text x="20" y="32" fill="#f0c000" font-size="19" font-weight="bold">🎣 Anatomia da cana (rod) — nome das peças</text>

  <!-- rod blank line -->
  <line x1="70" y1="150" x2="710" y2="120" stroke="#9fd0e0" stroke-width="6" stroke-linecap="round"/>
  <!-- cork handle -->
  <rect x="70" y="138" width="120" height="26" rx="10" fill="#c9a36a" stroke="#a07d44"/>
  <!-- reel seat -->
  <rect x="150" y="134" width="40" height="34" rx="5" fill="#c9d1d9" stroke="#8b949e"/>
  <circle cx="170" cy="174" r="7" fill="none" stroke="#c9d1d9" stroke-width="3"/>
  <!-- ferrule -->
  <rect x="382" y="129" width="14" height="14" rx="2" fill="#6b7681"/>
  <!-- guides (decreasing) -->
  <g fill="none" stroke="#d0d7de" stroke-width="2.5">
    <circle cx="250" cy="148" r="9"/><line x1="250" y1="157" x2="250" y2="146"/>
    <circle cx="330" cy="144" r="8"/><line x1="330" y1="152" x2="330" y2="142"/>
    <circle cx="460" cy="135" r="7"/><line x1="460" y1="142" x2="460" y2="133"/>
    <circle cx="560" cy="129" r="6"/><line x1="560" y1="135" x2="560" y2="127"/>
    <circle cx="650" cy="124" r="5"/><line x1="650" y1="129" x2="650" y2="122"/>
  </g>
  <!-- tip top -->
  <circle cx="706" cy="120" r="6" fill="none" stroke="#f0c000" stroke-width="3"/>

  <!-- labels -->
  <g font-size="12.5">
    <text x="110" y="210" fill="#e5d98a" text-anchor="middle" font-weight="bold">Punho</text>
    <text x="110" y="226" fill="#8b949e" text-anchor="middle">(cork handle)</text>
    <line x1="110" y1="166" x2="110" y2="196" stroke="#8b949e" stroke-width="1"/>

    <text x="170" y="250" fill="#e5d98a" text-anchor="middle" font-weight="bold">Carretel</text>
    <text x="170" y="266" fill="#8b949e" text-anchor="middle">(reel seat) — segura o carreto</text>
    <line x1="170" y1="182" x2="170" y2="236" stroke="#8b949e" stroke-width="1"/>

    <text x="250" y="200" fill="#9fd0e0" text-anchor="middle" font-weight="bold">Passadores / anéis</text>
    <text x="250" y="216" fill="#8b949e" text-anchor="middle">(guides) — seguram a linha</text>
    <line x1="250" y1="158" x2="250" y2="188" stroke="#8b949e" stroke-width="1"/>
    <line x1="330" y1="153" x2="300" y2="188" stroke="#8b949e" stroke-width="1"/>
    <line x1="460" y1="143" x2="430" y2="188" stroke="#8b949e" stroke-width="1"/>

    <text x="389" y="100" fill="#e5d98a" text-anchor="middle" font-weight="bold">Junção</text>
    <text x="389" y="84" fill="#8b949e" text-anchor="middle">(ferrule) — encaixe dos 2 troços</text>
    <line x1="389" y1="106" x2="389" y2="128" stroke="#8b949e" stroke-width="1"/>

    <text x="500" y="270" fill="#9fd0e0" text-anchor="middle" font-weight="bold">Blank</text>
    <text x="500" y="286" fill="#8b949e" text-anchor="middle">(corpo da cana — fibra de vidro)</text>
    <line x1="500" y1="131" x2="500" y2="256" stroke="#8b949e" stroke-width="1"/>

    <text x="706" y="170" fill="#f0c000" text-anchor="middle" font-weight="bold">Ponteira</text>
    <text x="706" y="186" fill="#8b949e" text-anchor="middle">(tip-top)</text>
    <line x1="706" y1="126" x2="706" y2="156" stroke="#f0c000" stroke-width="1"/>
  </g>

  <text x="20" y="296" fill="#5a86a0" font-size="11">⚠️ Faltam quase todos os passadores na cana do avô — é o que há a repor.</text>
</svg>
