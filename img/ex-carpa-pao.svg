<svg xmlns="http://www.w3.org/2000/svg" width="560" height="430" viewBox="0 0 560 430" font-family="Segoe UI, Arial, sans-serif">
  <rect width="560" height="430" fill="#0d1117"/>
  <text x="20" y="32" fill="#5fa8ff" font-size="19" font-weight="bold">🔵 CARPA — pão à superfície (floating bread)</text>
  <text x="20" y="54" fill="#8b949e" font-size="13">verão · água parada e quente · SEM chumbo · margem com sombra</text>

  <!-- big water body -->
  <rect x="0" y="150" width="560" height="280" fill="#0b2a3a" opacity="0.5"/>
  <line x1="0" y1="150" x2="560" y2="150" stroke="#7fd3ff" stroke-width="2" stroke-dasharray="7 5" opacity="0.8"/>
  <text x="500" y="144" fill="#7fd3ff" font-size="12">superfície</text>

  <line x1="230" y1="70" x2="230" y2="120" stroke="#b8a55a" stroke-width="4"/>
  <text x="255" y="92" fill="#e5d98a" font-size="13" font-weight="bold">Linha-mãe → snap → leader</text>
  <text x="255" y="110" fill="#8b949e" font-size="11">leader fino 0,20 mm (carpa desconfiada)</text>

  <line x1="230" y1="120" x2="230" y2="150" stroke="#7fd3ff" stroke-width="2.5"/>

  <!-- bread crust floating at surface -->
  <path d="M210 150 q-6 -16 14 -18 q22 -4 28 6 q12 0 8 12 q-2 8 -16 6 q-18 4 -34 -2 z" fill="#e8c98a" stroke="#c9a85a"/>
  <path d="M230 150 q0 14 -10 14 q-9 0 -9 -9" fill="none" stroke="#c9d1d9" stroke-width="2.5"/>
  <text x="270" y="138" fill="#e5d98a" font-size="13" font-weight="bold">crosta de pão (bread crust)</text>
  <text x="270" y="174" fill="#8b949e" font-size="11">anzol #8–6 escondido na côdea (sem chumbo)</text>

  <!-- chum bits -->
  <circle cx="150" cy="170" r="4" fill="#e8c98a" opacity="0.8"/>
  <circle cx="350" cy="178" r="5" fill="#e8c98a" opacity="0.8"/>
  <circle cx="420" cy="162" r="3.5" fill="#e8c98a" opacity="0.8"/>
  <text x="360" y="200" fill="#8b949e" font-size="11">atira bocados de pão à volta (chamariz)</text>

  <!-- carp silhouette rising -->
  <path d="M250 300 q40 -16 90 0 q-12 8 -30 9 l14 14 l-22 -10 q-30 0 -52 -10 q8 -8 0 -3 z" fill="#1d3b4a" stroke="#2f5a6e"/>
  <text x="250" y="330" fill="#5fa8ff" font-size="12">carpa sobe e suga o pão da superfície</text>

  <text x="30" y="400" fill="#5fa8ff" font-size="12.5">▸ Vê a carpa chegar. Espera a boca FECHAR no pão → ferra. Emocionante e barato.</text>
</svg>
